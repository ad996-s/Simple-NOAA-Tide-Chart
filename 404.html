<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Simple Tides</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="shortcut icon" href="/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="robots" content="noindex, follow">
  <style>
    :root {
      --bg-top: #dff5fc;
      --bg-bottom: #f4fbff;
      --ink: #0a2f45;
      --ink-soft: #48697c;
      --surface: rgba(255, 255, 255, 0.9);
      --line: rgba(11, 47, 67, 0.14);
      --accent: #0f86b9;
      --shadow: 0 18px 44px rgba(14, 62, 88, 0.16);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 8%, rgba(125, 200, 231, 0.45), transparent 25%),
        radial-gradient(circle at 88% 16%, rgba(15, 134, 185, 0.2), transparent 26%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .page {
      max-width: 560px;
      width: 100%;
      text-align: center;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 40px 28px;
    }
    .wave { font-size: 44px; margin-bottom: 6px; }
    h1 { margin: 0 0 8px; font-family: "Sora", "Manrope", sans-serif; }
    p { line-height: 1.6; color: var(--ink-soft); }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 22px;
    }
    .links a {
      color: #fff;
      background: var(--accent);
      font-weight: 700;
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 14px;
    }
    .links a.ghost {
      color: var(--ink);
      background: transparent;
      border: 1px solid var(--line);
    }
    .links a:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <main class="page">
    <div class="wave" aria-hidden="true">&#127754;</div>
    <h1>This page went out with the tide</h1>
    <p>We couldn't find the page you were looking for. It may have moved, or the link might be out of date.</p>
    <div class="links">
      <a href="/">Back to the tide map</a>
      <a class="ghost" href="/guides.html">Browse all guides</a>
    </div>
  </main>
</body>
</html>
